<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Python Friendly Error Messages - Demo</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="demo__source-bar" id="source-bar">
    <div class="container">
    </div>
  </div>
  <div class="container">
    <h1>Python Friendly Error Messages - Demo</h1>

    <div id="demo-container">
      Loading demo...
    </div>
  </div>

  <script type="module">
    import { examples } from './demo-examples.js';

    const pageParams = new URLSearchParams(window.location.search);
    const useLocal = pageParams.has('local');
    const cacheBust = pageParams.get('cb');

    const libPathBase = useLocal
      ? '../dist/index.browser.js'
      : './vendor/python-friendly-error-messages/index.browser.js';
    const libPath = cacheBust ? `${libPathBase}?cb=${encodeURIComponent(cacheBust)}` : libPathBase;

    const { friendlyExplain, loadCopydeck, registerAdapter, loadCopydeckFor, skulptAdapter, pyodideAdapter } = await import(libPath);

    async function initDemo() {
      const container = document.getElementById('demo-container');

      const switchUrl = useLocal ? 'index.html' : 'index.html?local';
      const bar = document.querySelector('#source-bar .container');
      if (useLocal) {
        bar.innerHTML = `
          <span class="demo__source-active demo__source-active--local">&#9679; local build <code>dist/</code></span>
          <a class="demo__source-switch" href="${switchUrl}">switch to vendored release</a>
        `;
      } else {
        bar.innerHTML = `
          <span class="demo__source-active demo__source-active--vendor">&#9679; vendored release</span>
          <a class="demo__source-switch" href="${switchUrl}">switch to local build</a>
        `;
      }

      const switchLink = bar.querySelector('.demo__source-switch');
      if (switchLink) {
        switchLink.addEventListener('click', (event) => {
          event.preventDefault();
          const target = new URL(switchLink.getAttribute('href'), window.location.href);
          target.searchParams.set('cb', String(Date.now()));
          window.location.assign(target.toString());
        });
      }

      try {
        await loadCopydeckFor('en');
        registerAdapter('skulpt', skulptAdapter);
        registerAdapter('pyodide', pyodideAdapter);

        let html = '<div class="demo__grid">';

        for (const example of examples) {
          try {
            const result = friendlyExplain({
              error: example.trace,
              code: example.code
            });

            html += `
              <div class="demo__card">
                <h2>
                  ${example.title}
                  <span class="demo__badge demo__badge--${example.runtime}">${example.runtime}</span>
                </h2>
                <div class="demo__card-content">
                  <div class="demo__trace-section">
                    <h3>Original Trace</h3>
                    <div class="demo__trace-raw">${escapeHtml(example.trace)}</div>
                  </div>
                  <div class="demo__trace-section">
                    <h3>Original Code</h3>
                    <div class="demo__code-example">${escapeHtml(example.code)}</div>
                  </div>
                  <div class="demo__explanation">
                    <h3>Friendly Explanation</h3>
                    ${result.html}
                  </div>
                </div>
              </div>
            `;
          } catch (err) {
            html += `
              <div class="demo__card">
                <h2>${example.title}</h2>
                <div class="demo__error">Error processing: ${escapeHtml(err.message)}</div>
              </div>
            `;
          }
        }

        html += '</div>';
        container.innerHTML = html;

        // click handlers for collapsible cards
        const cards = container.querySelectorAll('.demo__card');
        cards.forEach(card => {
          const h2 = card.querySelector('h2');
          if (h2) {
            h2.addEventListener('click', () => {
              card.classList.toggle('demo__card--expanded');
            });
          }
        });
      } catch (err) {
        container.innerHTML = `<div class="demo__error">Failed to load demo: ${escapeHtml(err.message)}</div>`;
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    initDemo();
  </script>
</body>

</html>
